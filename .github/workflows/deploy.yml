name: Deploy Vue to Pages

on:
  push:
    branches: ["main"]  # 发布分支（可能是 master）
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: idle-maple  # ⚠️ 进入 Vue 项目目录

      - name: Build Vue project
        run: npm run build
        working-directory: idle-maple  # ⚠️ 进入 Vue 项目目录

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: idle-maple/dist  # ⚠️ 构建产物在 dist 里

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4